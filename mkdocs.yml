site_name: RQM Documentation
site_description: Official documentation for the RQM quantum geometry ecosystem.
site_url: https://rqm-technologies-dev.github.io/rqm-docs/

repo_name: RQM-Technologies-dev/rqm-docs
repo_url: https://github.com/RQM-Technologies-dev/rqm-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Ecosystem: ecosystem.md
  - Quickstart: quickstart.md
  - Install: installation.md
  - Concepts:
      - Quaternion Intuition: concepts/quaternion-intuition.md
      - Spinors and the Bloch Sphere: concepts/spinor-bloch.md
      - SU(2) Geometry: concepts/su2-geometry.md
      - Global Phase: concepts/global-phase.md
  - Notebooks: notebooks.md
  - API:
      - rqm-core API: api/rqm-core-api.md
      - rqm-qiskit API: api/rqm-qiskit-api.md
  - Architecture: architecture.md
