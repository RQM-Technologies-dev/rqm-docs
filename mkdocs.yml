site_name: RQM Platform
site_description: RQM — quaternionic, compiler-first quantum software spanning optimization, execution routing, analysis, and Studio workflows.
site_url: https://docs.rqmtechnologies.com/

repo_name: RQM-Technologies-dev/rqm-docs
repo_url: https://github.com/RQM-Technologies-dev/rqm-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - assets/js/pdf-export.js

extra_css:
  - assets/css/pdf-print.css

nav:
  - Home: index.md
  - Quickstart: api/quickstart.md
  - Studio:
      - Overview: applications/index.md
      - Workflows: applications/studio-workflows.md
      - Optimization Theory: applications/optimization-theory.md
      - Pro: applications/studio-pro.md
      - Optimize Circuits: applications/optimize-circuits.md
      - Verify Optimizations: applications/verify-optimizations.md
      - Visualize Quantum Geometry: applications/visualize-quantum-geometry.md
  - API Reference:
      - Overview: api/rqm-api-api.md
      - API Quickstart: api/quickstart.md
      - Execution: api/execution.md
      - Execution Capabilities: api/execution-capabilities.md
      - Coupling Analysis: api/coupling-analysis.md
      - Authentication: api/authentication.md
      - Billing & Wallet: api/billing-and-wallet.md
      - Chat & TTS: api/chat-and-tts.md
      - rqm-core: api/rqm-core-api.md
      - rqm-compiler: api/rqm-compiler-api.md
      - Backends: api/backends.md
  - Concepts:
      - Overview: concepts.md
      - Ecosystem: ecosystem.md
      - Architecture: architecture.md
      - Optimization: optimization.md
      - Canonical IR (u1q): compiler/canonical-ir.md
      - Notebooks: notebooks.md
      - Install: installation.md
      - SDK Quickstart: quickstart.md
      - Deep Dives:
          - Quaternion Intuition: concepts/quaternion-intuition.md
          - Spinors and the Bloch Sphere: concepts/spinor-bloch.md
          - SU(2) Geometry: concepts/su2-geometry.md
          - Global Phase: concepts/global-phase.md
          - Complete Quaternion Theory: concepts/quaternion-theory.md
  - Research:
      - QCE 2026 Paper Draft: research/qce2026-u1q-paper.md
