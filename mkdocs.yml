site_name: RQM Platform
site_description: Product documentation for RQM circuit optimization, execution routing, and geometry-native analysis.
site_url: https://docs.rqmtechnologies.com/

repo_name: RQM-Technologies-dev/rqm-docs
repo_url: https://github.com/RQM-Technologies-dev/rqm-docs

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.expand
    - content.action.edit
    - content.tooltips
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - assets/js/pdf-export.js

extra_css:
  - assets/css/pdf-print.css
  - assets/css/rqm-modern.css

