site_name: RQM Documentation
site_description: Official documentation for the RQM quantum computing platform.
site_url: https://rqm-technologies-dev.github.io/rqm-docs/

repo_name: RQM-Technologies-dev/rqm-docs
repo_url: https://github.com/RQM-Technologies-dev/rqm-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: api/quickstart.md
  - Applications:
      - Overview: applications/index.md
      - Optimize Circuits: applications/optimize-circuits.md
      - Verify Optimizations: applications/verify-optimizations.md
      - Visualize Quantum Geometry: applications/visualize-quantum-geometry.md
  - API Reference:
      - Overview: api/rqm-api-api.md
      - rqm-circuits: api/rqm-circuits-api.md
      - rqm-compiler: api/rqm-compiler-api.md
      - rqm-core: api/rqm-core-api.md
      - Backends (Qiskit · Braket · PennyLane): api/backends.md
      - rqm-qiskit: api/rqm-qiskit-api.md
  - Concepts:
      - Overview: concepts.md
      - Ecosystem: ecosystem.md
      - Architecture: architecture.md
      - Optimization: optimization.md
      - Canonical IR (u1q): compiler/canonical-ir.md
      - Notebooks: notebooks.md
      - Install: installation.md
      - SDK Quickstart: quickstart.md
      - Deep Dives:
          - Quaternion Intuition: concepts/quaternion-intuition.md
          - Spinors and the Bloch Sphere: concepts/spinor-bloch.md
          - SU(2) Geometry: concepts/su2-geometry.md
          - Global Phase: concepts/global-phase.md
          - Complete Quaternion Theory: concepts/quaternion-theory.md
